# =============================================================
# Default configuration for the LLM Data Curator.
# Every value here can be overridden from the command line via
# utils/options.py, e.g.:
#   python main.py --dataset a --method less --budget 0.05
#   python main.py -o train.lr=1e-5 -o model.load_in_8bit=true
# =============================================================

# ---- Experiment ----
seed: 42
device: cuda                 # cuda | cpu | mps
output_dir: ./outputs

# ---- Model ----
model:
  name: Qwen/Qwen2.5-3B-Instruct
  tokenizer_name: null        # null -> use `model.name`
  max_length: 2048
  torch_dtype: bfloat16       # float32 | float16 | bfloat16
  load_in_8bit: false
  trust_remote_code: false

# ---- LoRA (used for the warmup / influence model) ----
lora:
  enable: true
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: [q_proj, k_proj, v_proj, o_proj]

# ---- Dataset ----
# `name` selects the module dataset/load_<name>.py, which builds
# {data_dir}/<name>.jsonl on first use and then loads it. Available:
#   alpaca      -> Stanford Alpaca 52k (Hub)
#   wizardlm    -> WizardLM Evol-Instruct (Hub)
#   less        -> FLAN V2 + CoT + Dolly + OpenAssistant1 mixture (local Tulu files)
#   gsm8k       -> GSM8K grade-school math word problems (Hub)
#   bioinstruct -> BioInstruct 25k biomedical instructions (Hub)
#   dialogsum   -> DialogSum dialogue summarization (Hub)
# Optional prep knobs (read when the cache is built), e.g. via -o or here:
#   sample_percentage: 0.05      # fraction of each source to keep
#   source: tatsu-lab/alpaca     # override the Hub id (alpaca / wizardlm)
#   data_files: ./raw/alpaca.json  # local source file instead of the Hub
#   processed_dir: ./raw         # (less) dir with the four Tulu *_data.jsonl files
dataset:
  name: alpaca
  data_dir: ./data
  validation_split: 0.05

# ---- Pipeline (operator orchestration) ----
# A run is a CASCADE OF OPERATORS: every method in alg/ (and every `default`
# scorer+policy pairing) is one operator, chained so each stage filters the
# previous stage's survivors. A single method is just a one-stage pipeline.
#
# Each stage overlays the base config for that operator only:
#   method       -- which alg/<method>.py operator; omit -> `default`, which
#                   composes a `scorer` (axes ①②③, scorer/<scorer>.py) with a
#                   `policy` (axis ④, policy/<policy>.py). Available scorers:
#                   bm25, embedding, ppl. Custom methods (less, ifd, greats,
#                   adapt, miwv, random, ...) wire their own scorer AND policy,
#                   so `scorer`/`policy` are ignored for them.
#   scorer/policy-- `default` only. policy maps scores -> a subset/weights:
#                   hard (top-k, default), diversity (k-center coverage; needs a
#                   feature-exposing scorer), reweight (soft weights; ADAPT's gate).
#   model        -- model.name for this stage (loaded lazily & cached; only one
#                   extra model resident at a time, so long chains don't OOM).
#   reference    -- dataset name used as this stage's val_dataset (② comparison
#                   target, e.g. LESS's influence anchor); null reuses the
#                   top-level validation split.
#   budget       -- fraction (<=1) or int count kept from the CURRENT survivors
#                   (cascade): two 0.5 stages keep 0.5 x 0.5 = 25% of the original.
#   <hyper-param> -- any OTHER key is a method knob, i.e. shorthand for
#                   selection.<key>: `warmup_steps: 100` == `--warmup-steps 100`.
#                   List a method's knobs with e.g. `--method less --help`.
#
# The CLI is a shortcut for a ONE-stage pipeline and overrides this list:
#   python main.py --method less --budget 0.05
#   python main.py --scorer bm25 --policy hard
#   python main.py --budget 0.1                 # bare `default` operator
# A `pipeline_planner` decides the cascade's stages. Omitted (or type: list) ->
# the static `pipeline:` list below runs exactly as written. type: llm hands
# orchestration to an LLM controller that CHOOSES each stage from live structural
# state (survivors remaining, budget spent, operators already run -- no per-step
# eval), subject to four guardrails: a hard step cap (max_stages), a budget floor
# (min_keep), operator-name validation, and a decision log at
# <output_dir>/planner_decisions.jsonl. The controller LLM is an OpenAI-compatible
# endpoint (env OPENAI_API_KEY / OPENAI_BASE_URL), NOT the local model being tuned.
# pipeline_planner:
#   type: llm
#   model: gpt-5-mini
#   max_stages: 6
#   min_keep: 0.01
#   goal: "Select a small, high-quality subset for math reasoning."

pipeline:
  - method: default
    budget: 0.05
  # A multi-stage example (coarse cheap filter, then precise filter on survivors):
  # - name: coarse-ppl
  #   method: ppl
  #   model: Qwen/Qwen2.5-0.5B-Instruct
  #   budget: 0.5
  # - name: precise-less
  #   method: less
  #   model: Qwen/Qwen2.5-3B-Instruct
  #   reference: bbh
  #   budget: 0.1
  #   warmup_steps: 100         # method knob -> selection.warmup_steps

# ---- Training (final run on the selected subset) ----
train:
  epochs: 3
  batch_size: 4
  grad_accum: 8
  lr: 2.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  save_strategy: epoch
  bf16: true
  fp16: false
  gradient_checkpointing: true
